# Render Blueprint for SportSphere
# Deploys a free Node web service + a free PostgreSQL database so that
# user accounts, wallets and points persist across redeploys.
services:
  - type: web
    name: sportsphere
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: ADMIN_SECRET
        generateValue: true
      # Durable storage — connects the web service to the database below.
      - key: DATABASE_URL
        fromDatabase:
          name: sportsphere-db
          property: connectionString

# Free PostgreSQL database provisioned automatically by the Blueprint.
databases:
  - name: sportsphere-db
    plan: free
    databaseName: sportsphere
    user: sportsphere
