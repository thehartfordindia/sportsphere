# Render Blueprint for SportSphere
# Deploys a free Node web service.
#
# NOTE: Render's free plan allows only ONE free PostgreSQL database per account.
# This blueprint therefore does NOT create its own database, so it deploys even
# if you already have a free database in use elsewhere.
#
# To make accounts/wallets persist across redeploys, add a DATABASE_URL:
#   - reuse an existing Postgres and paste its Internal Connection String, OR
#   - create a new Render Postgres (needs a free slot) and set DATABASE_URL
#     in the service's Environment tab.
services:
  - type: web
    name: sportsphere
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: ADMIN_SECRET
        generateValue: true
      # Optional durable storage — set this in the dashboard's Environment tab
      # with a Postgres Internal Connection String to persist accounts/wallets.
      # - key: DATABASE_URL
      #   sync: false
